services:
  blackbox:
    container_name: blackbox-ctf
    build: .
    restart: unless-stopped  # Changed from 'always' - will auto-restart on crash
    # user: "1001:${DOCKER_GID:-999}"  # Commented out to run as root to fix permission issues
    ports:
      - "8000:8000"
      - "30000-30100:30000-30100"  # Port range for challenge containers
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:password@mongo:27017/ctf_platform?authSource=admin}
      - REDIS_URL=redis://cache:6379/0
      - UPLOAD_FOLDER=/var/uploads
      - CTF_NAME=${CTF_NAME:-BlackBox CTF}
      - WORKERS=8
      - LOG_FOLDER=/var/log/blackbox
      - REVERSE_PROXY=true
    entrypoint: ["/bin/bash", "/opt/blackbox/docker-entrypoint.sh"]
    # volumes:
    #   - .:/opt/blackbox:ro
    #   - uploads:/var/uploads
    #   - logs:/var/log/blackbox
    volumes:
      - uploads:/var/uploads
      - logs:/var/log/blackbox
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for container management
    depends_on:
      mongo:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      default:
      internal:
      challenge_network:  # Network for challenge containers
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "10", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    container_name: blackbox-nginx
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf/nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads:/var/uploads:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - blackbox
    networks:
      default:

  mongo:
    container_name: blackbox-mongo
    image: mongo:6.0
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
    networks:
      internal:
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cache:
    container_name: blackbox-cache
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      internal:
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --maxclients 20000 --tcp-backlog 511 --timeout 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
  nginx_cache:
    driver: local
  backups:
    driver: local

networks:
  default:
    driver: bridge
  internal:
    driver: bridge
    internal: true
  challenge_network:
    driver: bridge
    name: ctf_challenges
