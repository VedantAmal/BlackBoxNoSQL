<!-- Admin Sidebar Component -->
<div class="admin-sidebar p-3">
    <h5 class="mb-3">Admin Menu</h5>
    <nav class="nav flex-column">
        <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="{{ url_for('admin.manage_challenges') }}" class="admin-nav-link {% if request.endpoint in ['admin.manage_challenges', 'admin.create_challenge', 'admin.edit_challenge'] %}active{% endif %}">
            <i class="bi bi-puzzle"></i> Challenges
        </a>
        <a href="{{ url_for('admin.manage_branching') }}" class="admin-nav-link {% if request.endpoint == 'admin.manage_branching' %}active{% endif %}">
            <i class="bi bi-diagram-3"></i> 
            {% if settings.get('act_system_enabled', False) %}
                Story & Branching
            {% else %}
                Challenge Configs
            {% endif %}
        </a>
        <a href="{{ url_for('admin.manage_users') }}" class="admin-nav-link {% if request.endpoint == 'admin.manage_users' %}active{% endif %}">
            <i class="bi bi-people"></i> Users
        </a>
        <a href="{{ url_for('admin.manage_teams') }}" class="admin-nav-link {% if request.endpoint == 'admin.manage_teams' %}active{% endif %}">
            <i class="bi bi-people-fill"></i> Teams
        </a>
        <a href="{{ url_for('admin.manage_notifications') }}" class="admin-nav-link {% if request.endpoint == 'admin.manage_notifications' %}active{% endif %}">
            <i class="bi bi-bell"></i> Notifications
        </a>
        <a href="{{ url_for('admin.flag_abuse') }}" class="admin-nav-link {% if request.endpoint == 'admin.flag_abuse' %}active{% endif %}">
            <i class="bi bi-shield-exclamation"></i> Flag Sharing
        </a>
        <a href="{{ url_for('admin.hint_logs') }}" class="admin-nav-link {% if request.endpoint == 'admin.hint_logs' %}active{% endif %}">
            <i class="bi bi-journal-text"></i> Hint Logs
        </a>
        <a href="{{ url_for('admin.backups') }}" class="admin-nav-link {% if request.endpoint == 'admin.backups' %}active{% endif %}">
            <i class="bi bi-cloud-arrow-down"></i> Backups
        </a>
        <a href="{{ url_for('admin.docker_settings') }}" class="admin-nav-link {% if request.endpoint == 'admin.docker_settings' %}active{% endif %}">
            <i class="bi bi-box"></i> Docker Config
        </a>
        <a href="{{ url_for('admin.docker_status') }}" class="admin-nav-link {% if request.endpoint == 'admin.docker_status' %}active{% endif %}">
            <i class="bi bi-box-seam"></i> Docker Status
        </a>
        <a href="{{ url_for('admin.dynamic_flags_monitor') }}" class="admin-nav-link {% if request.endpoint == 'admin.dynamic_flags_monitor' %}active{% endif %}">
            <i class="bi bi-shield-lock"></i> Dynamic Flags
        </a>
        <a href="{{ url_for('admin.ctf_control') }}" class="admin-nav-link {% if request.endpoint == 'admin.ctf_control' %}active{% endif %}">
            <i class="bi bi-clock-history"></i> CTF Control
        </a>
        <a href="{{ url_for('admin.settings') }}" class="admin-nav-link {% if request.endpoint == 'admin.settings' %}active{% endif %}">
            <i class="bi bi-gear"></i> Settings
        </a>
    </nav>
</div>
